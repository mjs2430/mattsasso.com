		<script>
window.addEventListener("message", e => {
  let d = e.data;

  if(d.sentinel == 'gofer' && d.type == 'resize') {
    let f = document.querySelector(`iframe[src="${d.location}"]`);
    if(f && f.style) {
      f.style.height = `${d.height}px`;
    }
  }
});
</script>
